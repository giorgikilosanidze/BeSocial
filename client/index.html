<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Warm the TLS connection to the image CDN so the LCP image loads sooner. -->
		<link rel="preconnect" href="https://res.cloudinary.com" />
		<link rel="dns-prefetch" href="https://res.cloudinary.com" />
		<title>BeSocial</title>
		<meta
			name="description"
			content="BeSocial is a social network where you can share posts, follow people, chat in real time, and stay connected with your community."
		/>

		<!-- Open Graph (Facebook, LinkedIn, etc.) -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="BeSocial" />
		<meta property="og:title" content="BeSocial" />
		<meta
			property="og:description"
			content="Share posts, follow people, and chat in real time on BeSocial."
		/>

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="BeSocial" />
		<meta
			name="twitter:description"
			content="Share posts, follow people, and chat in real time on BeSocial."
		/>
	</head>
	<body>
		<div id="root"></div>
		<div id="modal"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
